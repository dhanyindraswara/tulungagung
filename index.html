<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Jelajah Tulungagung — Petualangan Piksel</title>
<style>
  :root{
    --ink:#2b2118; --paper:#f4e9d2; --paper2:#efe0c2; --gold:#caa24a; --gold2:#e7c66b;
    --leaf:#3f7d4e; --sea:#2e7c8c; --brick:#9c5a3c; --rose:#c2532f; --shadow:rgba(40,28,16,.35);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;overflow:hidden;background:#13202a;font-family:'Trebuchet MS','Segoe UI',sans-serif;color:var(--ink);}
  #game{position:fixed;inset:0;overflow:hidden;touch-action:none;}
  canvas#world{position:absolute;inset:0;width:100%;height:100%;display:block;image-rendering:pixelated;}

  .panel{background:var(--paper);border:4px solid var(--ink);border-radius:14px;box-shadow:0 0 0 4px var(--gold) inset,8px 8px 0 var(--shadow);}
  .btn{font-family:inherit;font-weight:bold;cursor:pointer;border:3px solid var(--ink);background:linear-gradient(var(--gold2),var(--gold));color:#3a2a12;border-radius:10px;padding:10px 18px;box-shadow:3px 3px 0 var(--shadow);transition:transform .08s,box-shadow .08s;font-size:15px;letter-spacing:.3px;}
  .btn:active{transform:translate(2px,2px);box-shadow:1px 1px 0 var(--shadow);}
  .btn.alt{background:linear-gradient(#f0e2c2,#e3cf9f);}

  #hud{position:absolute;inset:0;pointer-events:none;}
  #hud>*{pointer-events:auto;}
  .topbar{position:absolute;top:max(10px,env(safe-area-inset-top));left:10px;right:10px;display:flex;gap:8px;align-items:flex-start;justify-content:space-between;}
  .badgechip{display:flex;align-items:center;gap:8px;background:var(--paper);border:3px solid var(--ink);border-radius:999px;padding:5px 12px 5px 8px;box-shadow:3px 3px 0 var(--shadow);font-weight:bold;font-size:13px;}
  .badgechip .ring{width:28px;height:28px;border-radius:50%;background:conic-gradient(var(--leaf) var(--p,0deg),#d8c39a 0);display:grid;place-items:center;}
  .badgechip .ring i{width:19px;height:19px;border-radius:50%;background:var(--paper);display:grid;place-items:center;font-style:normal;font-size:11px;}
  .iconbtns{display:flex;gap:7px;flex-wrap:wrap;justify-content:flex-end;max-width:60vw;}
  .iconbtn{min-width:44px;height:44px;padding:0 8px;display:grid;place-items:center;font-size:19px;background:var(--paper);border:3px solid var(--ink);border-radius:12px;box-shadow:3px 3px 0 var(--shadow);cursor:pointer;line-height:1;font-weight:bold;}
  .iconbtn:active{transform:translate(2px,2px);box-shadow:1px 1px 0 var(--shadow);}
  .iconbtn.on{background:linear-gradient(var(--gold2),var(--gold));}
  #btnLang{font-size:13px;letter-spacing:1px;}

  #quest{position:absolute;left:10px;top:62px;max-width:min(64vw,360px);background:rgba(244,233,210,.95);border:3px solid var(--ink);border-left:10px solid var(--rose);border-radius:10px;padding:8px 12px;box-shadow:4px 4px 0 var(--shadow);font-size:13px;}
  #quest b{display:block;font-size:10px;letter-spacing:1.4px;text-transform:uppercase;color:var(--rose);margin-bottom:1px;}
  #quest span{font-weight:bold;line-height:1.25;display:block;}

  /* minimap */
  #minimap{position:absolute;right:10px;top:64px;background:rgba(244,233,210,.92);border:3px solid var(--ink);border-radius:10px;padding:5px;box-shadow:4px 4px 0 var(--shadow);}
  #minimap canvas{display:block;border-radius:5px;image-rendering:pixelated;}
  #minimap .mlbl{font-size:9px;font-weight:bold;text-align:center;letter-spacing:1px;text-transform:uppercase;opacity:.6;margin-top:2px;}

  /* compass chip */
  #compass{position:absolute;left:50%;bottom:16%;transform:translateX(-50%);display:none;align-items:center;gap:10px;background:var(--ink);color:var(--paper);border:3px solid var(--gold);border-radius:999px;padding:7px 16px 7px 10px;box-shadow:0 6px 0 var(--shadow);font-weight:bold;font-size:13px;max-width:84vw;}
  #compass .needle{width:30px;height:30px;border-radius:50%;background:var(--gold);color:var(--ink);display:grid;place-items:center;font-size:16px;flex:0 0 auto;}
  #compass .needle b{display:block;transition:transform .15s;}
  #compass .ctxt small{display:block;font-weight:normal;opacity:.8;font-size:11px;}

  #prompt{position:absolute;left:50%;bottom:26%;transform:translateX(-50%);background:var(--ink);color:var(--paper);border:3px solid var(--gold);border-radius:999px;padding:8px 18px;font-weight:bold;font-size:14px;display:none;align-items:center;gap:8px;box-shadow:0 6px 0 var(--shadow);animation:bob 1s ease-in-out infinite;}
  @keyframes bob{50%{transform:translateX(-50%) translateY(-5px);}}
  #prompt .key{background:var(--gold);color:var(--ink);border-radius:6px;padding:1px 8px;font-size:13px;}

  #toast{position:absolute;left:50%;top:13%;transform:translateX(-50%) translateY(-30px);opacity:0;background:var(--ink);color:#fff;border:3px solid var(--gold);border-radius:12px;padding:12px 20px;font-weight:bold;box-shadow:6px 6px 0 var(--shadow);transition:.4s;max-width:80vw;text-align:center;font-size:15px;z-index:25;}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  #toast small{display:block;font-weight:normal;opacity:.85;font-size:12px;margin-top:3px;}

  #touch{position:absolute;inset:0;pointer-events:none;display:none;}
  #joy{position:absolute;left:max(18px,env(safe-area-inset-left));bottom:max(24px,env(safe-area-inset-bottom));width:140px;height:140px;border-radius:50%;background:rgba(244,233,210,.28);border:3px solid rgba(43,33,24,.55);pointer-events:auto;touch-action:none;}
  #joy .nub{position:absolute;left:50%;top:50%;width:60px;height:60px;margin:-30px 0 0 -30px;border-radius:50%;background:radial-gradient(circle at 35% 30%,var(--gold2),var(--gold));border:3px solid var(--ink);box-shadow:0 4px 0 var(--shadow);}
  #actBtn{position:absolute;right:max(20px,env(safe-area-inset-right));bottom:max(40px,env(safe-area-inset-bottom));width:96px;height:96px;border-radius:50%;background:radial-gradient(circle at 35% 30%,#f3b15a,var(--rose));border:4px solid var(--ink);color:#fff;font-weight:bold;font-size:15px;pointer-events:auto;box-shadow:0 6px 0 var(--shadow);display:grid;place-items:center;text-align:center;line-height:1.05;touch-action:none;}
  #actBtn:active{transform:translateY(3px);box-shadow:0 3px 0 var(--shadow);}

  .scrim{position:absolute;inset:0;background:rgba(19,32,42,.72);display:none;align-items:center;justify-content:center;padding:16px;z-index:20;backdrop-filter:blur(2px);}
  .scrim.show{display:flex;}

  #start .panel{max-width:580px;width:100%;padding:0;overflow:hidden;text-align:center;max-height:94vh;display:flex;flex-direction:column;}
  #start .hero{padding:24px 24px 16px;background:radial-gradient(120% 90% at 50% -20%,#ffe7a8 0%,transparent 60%),linear-gradient(#1d3a44,#16606b);color:#fff;position:relative;flex:0 0 auto;}
  #start h1{margin:.1em 0 .05em;font-size:clamp(28px,7vw,46px);letter-spacing:1px;text-shadow:0 3px 0 #0a2b32,3px 3px 0 #0a2b32;line-height:1;}
  #start .tag{font-size:13px;opacity:.95;letter-spacing:3px;text-transform:uppercase;}
  #start .langrow{display:flex;gap:6px;justify-content:center;margin-top:12px;}
  #start .langrow button{font-family:inherit;font-weight:bold;font-size:12px;letter-spacing:.5px;border:2px solid #fff;background:rgba(255,255,255,.12);color:#fff;border-radius:999px;padding:5px 14px;cursor:pointer;}
  #start .langrow button.on{background:#fff;color:#16606b;}
  #start .body{padding:18px 22px 22px;overflow:auto;}
  #start p.lead{margin:.2em 0 1em;font-size:15px;line-height:1.5;}
  .howto{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:0 0 16px;font-size:12.5px;text-align:left;}
  .howto div{background:var(--paper2);border:2px solid var(--ink);border-radius:8px;padding:7px 10px;}
  .howto b{color:var(--brick);}
  #start .start-actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}
  .credit{margin-top:14px;font-size:11px;opacity:.7;line-height:1.5;}

  #popup .panel{max-width:580px;width:100%;padding:0;overflow:hidden;max-height:94vh;display:flex;flex-direction:column;}
  .pp-top{position:relative;height:188px;overflow:hidden;border-bottom:4px solid var(--ink);flex:0 0 auto;}
  .pp-top canvas{width:100%;height:100%;display:block;image-rendering:auto;}
  .pp-kind{position:absolute;top:12px;left:12px;background:var(--ink);color:#fff;font-size:11px;font-weight:bold;letter-spacing:1.5px;text-transform:uppercase;padding:4px 12px;border-radius:999px;border:2px solid var(--gold);}
  .pp-stamp{position:absolute;top:10px;right:10px;width:72px;height:72px;border-radius:50%;border:3px dashed #fff;color:#fff;display:none;place-items:center;text-align:center;font-size:10px;font-weight:bold;transform:rotate(-12deg);background:rgba(63,125,78,.55);line-height:1.15;}
  .pp-stamp.on{display:grid;}
  .pp-body{padding:16px 20px 18px;overflow:auto;}
  .pp-body h2{margin:0 0 3px;font-size:23px;line-height:1.05;}
  .pp-loc{font-size:12.5px;color:var(--brick);font-weight:bold;margin-bottom:10px;}
  .pp-loc::before{content:'📍 ';}
  .pp-meta{display:flex;flex-wrap:wrap;gap:7px;margin:0 0 12px;align-items:center;}
  .chip{display:inline-flex;align-items:center;gap:5px;font-size:12.5px;font-weight:bold;border:2px solid var(--ink);border-radius:999px;padding:5px 11px;background:var(--paper2);text-decoration:none;color:var(--ink);}
  .chip.star{background:#fff4d6;}
  .chip.price{background:#e7f0d6;}
  .chip.link{background:linear-gradient(var(--gold2),var(--gold));}
  .chip.link:active{transform:translateY(1px);}
  .pp-desc{font-size:14px;line-height:1.55;margin:0 0 12px;}
  .pp-facts{list-style:none;padding:0;margin:0 0 12px;display:flex;flex-direction:column;gap:6px;}
  .pp-facts li{background:var(--paper2);border-left:5px solid var(--gold);border-radius:6px;padding:7px 11px;font-size:13px;line-height:1.4;}
  .pp-note{font-size:11px;opacity:.62;margin:0 0 10px;}
  .pp-foot{display:flex;flex-wrap:wrap;gap:8px;align-items:center;justify-content:space-between;border-top:2px dashed #c8b283;padding-top:12px;}
  .pp-src{font-size:12px;}.pp-src a{color:var(--brick);}
  .closeX{position:absolute;top:-14px;right:-14px;width:40px;height:40px;border-radius:50%;background:var(--rose);color:#fff;border:3px solid var(--ink);font-size:20px;font-weight:bold;cursor:pointer;box-shadow:3px 3px 0 var(--shadow);z-index:5;}

  #book .panel{max-width:780px;width:100%;max-height:90vh;display:flex;flex-direction:column;padding:0;overflow:hidden;}
  .bk-head{background:linear-gradient(#1d3a44,#16606b);color:#fff;padding:14px 18px;display:flex;align-items:center;justify-content:space-between;gap:10px;}
  .bk-head h2{margin:0;font-size:21px;}
  .bk-tabs{display:flex;gap:6px;padding:10px 14px 0;flex-wrap:wrap;}
  .bk-tab{font-size:12.5px;font-weight:bold;border:2px solid var(--ink);background:var(--paper2);border-radius:999px 999px 0 0;padding:6px 13px;cursor:pointer;border-bottom:none;}
  .bk-tab.on{background:var(--gold);}
  .bk-grid{padding:12px 16px 18px;overflow:auto;display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;}
  .bk-card{background:var(--paper2);border:3px solid var(--ink);border-radius:10px;overflow:hidden;cursor:pointer;box-shadow:3px 3px 0 var(--shadow);transition:transform .08s;}
  .bk-card:active{transform:translate(2px,2px);}
  .bk-card .thumb{height:78px;position:relative;}
  .bk-card .thumb canvas{width:100%;height:100%;display:block;}
  .bk-card.locked{filter:grayscale(1) brightness(.82);opacity:.85;}
  .bk-card .lk{position:absolute;inset:0;display:grid;place-items:center;font-size:24px;background:rgba(20,20,20,.25);}
  .bk-card .nm{padding:7px 9px;font-size:12.5px;font-weight:bold;line-height:1.2;}
  .bk-card .nm small{display:block;font-weight:normal;opacity:.7;font-size:10.5px;margin-top:2px;}

  #dialog{position:absolute;left:50%;bottom:8%;transform:translateX(-50%);width:min(620px,92vw);z-index:18;display:none;}
  #dialog .panel{padding:14px 18px;display:flex;gap:14px;align-items:flex-start;}
  #dialog .face{width:54px;height:54px;border-radius:10px;border:3px solid var(--ink);flex:0 0 auto;image-rendering:pixelated;}
  #dialog .who{font-size:12px;font-weight:bold;color:var(--brick);letter-spacing:1px;text-transform:uppercase;}
  #dialog .line{font-size:15px;line-height:1.5;margin-top:2px;}
  #dialog .more{font-size:11px;opacity:.6;text-align:right;margin-top:6px;}

  /* photo viewer */
  .pp-top img.pp-photo{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:none;cursor:zoom-in;background:#1d3a44;z-index:1;}
  .pp-top img.pp-photo.on{display:block;}
  .pp-nav{position:absolute;top:50%;transform:translateY(-50%);width:34px;height:48px;display:none;place-items:center;background:rgba(20,20,20,.45);color:#fff;font-size:26px;cursor:pointer;border:none;z-index:3;border-radius:8px;}
  .pp-nav.prev{left:8px;}.pp-nav.next{right:8px;}
  .pp-top.multi .pp-nav{display:grid;}
  .pp-count{position:absolute;top:10px;right:50%;transform:translateX(50%);background:rgba(20,20,20,.6);color:#fff;font-size:11px;font-weight:bold;padding:2px 10px;border-radius:999px;z-index:3;display:none;}
  .pp-count.on{display:block;}
  .pp-cap{position:absolute;left:0;right:0;bottom:0;background:linear-gradient(transparent,rgba(10,10,10,.8));color:#fff;font-size:10.5px;padding:20px 12px 7px;z-index:2;display:none;line-height:1.35;}
  .pp-cap.on{display:block;}.pp-cap a{color:#ffe7a8;}
  .pp-spin{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;background:rgba(20,40,50,.4);z-index:4;color:#fff;font-size:12px;font-weight:bold;gap:8px;}
  .pp-spin.on{display:flex;}
  .pp-spin .sp{width:30px;height:30px;border:4px solid rgba(255,255,255,.3);border-top-color:#ffe7a8;border-radius:50%;animation:spin 1s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  /* travel chips */
  .pp-travel{display:flex;flex-wrap:wrap;gap:7px;margin:0 0 10px;}
  .tchip{display:inline-flex;align-items:center;gap:6px;font-size:12px;background:#fff;border:1.5px solid #e0d2ad;border-radius:10px;padding:5px 10px;}
  .tchip b{color:var(--brick);}
  .tchip small{opacity:.75;}
  .goodrow{display:flex;flex-wrap:wrap;gap:5px;margin:0 0 12px;}
  .gtag{font-size:11px;font-weight:bold;background:#d7e8c4;color:#3a5a28;border-radius:999px;padding:3px 9px;}
  .chip.wish{cursor:pointer;background:#fff4d6;}
  .chip.wish.on{background:linear-gradient(var(--gold2),var(--gold));}
  /* lightbox */
  #lightbox .lb-wrap{position:relative;max-width:96vw;max-height:90vh;display:flex;align-items:center;justify-content:center;}
  #lightbox img{max-width:96vw;max-height:82vh;border-radius:8px;border:3px solid #000;box-shadow:0 10px 40px rgba(0,0,0,.6);}
  #lightbox .lb-nav{position:absolute;top:50%;transform:translateY(-50%);width:50px;height:66px;display:grid;place-items:center;background:rgba(255,255,255,.16);color:#fff;font-size:34px;cursor:pointer;border-radius:10px;border:none;}
  #lightbox .lb-nav.prev{left:-6px;}#lightbox .lb-nav.next{right:-6px;}
  #lightbox .lb-cap{position:absolute;left:0;right:0;bottom:-4px;transform:translateY(100%);color:#eee;font-size:12px;padding:8px 4px;text-align:center;line-height:1.4;}
  #lightbox .lb-cap a{color:#ffe7a8;}
  @media(max-width:560px){#lightbox .lb-cap{position:static;transform:none;margin-top:8px;}#lightbox .lb-nav{width:40px;font-size:28px;}}
  /* about */
  #about .panel{max-width:600px;width:100%;max-height:90vh;display:flex;flex-direction:column;padding:0;overflow:hidden;}
  #about .ab-body{padding:16px 22px 22px;overflow:auto;}
  #about .ab-body h3{margin:14px 0 4px;font-size:15px;color:var(--brick);}
  #about .ab-body h3:first-child{margin-top:0;}
  #about .ab-body p{margin:0;font-size:13.5px;line-height:1.55;}
  .bk-card .cardwish{position:absolute;top:5px;right:5px;width:26px;height:26px;border-radius:50%;background:rgba(255,255,255,.88);border:2px solid var(--ink);display:grid;place-items:center;font-size:13px;cursor:pointer;z-index:3;}
  .bk-card .cardwish.on{background:var(--gold);}
  .hint{font-size:11px;opacity:.7;}
  @media (max-width:560px){.howto{grid-template-columns:1fr;}#quest{font-size:12px;max-width:54vw;}.pp-top{height:150px;}.iconbtns{max-width:52vw;}}
</style>
</head>
<body>
<div id="game">
  <canvas id="world"></canvas>

  <div id="hud">
    <div class="topbar">
      <div class="badgechip"><span class="ring" id="progRing"><i id="progNum">0</i></span><span id="progTxt">0/23</span></div>
      <div class="iconbtns">
        <div class="iconbtn" id="btnLang">ID</div>
        <div class="iconbtn" id="btnAbout" title="Info">ℹ️</div>
        <div class="iconbtn on" id="btnMap" title="Peta">🗺️</div>
        <div class="iconbtn" id="btnBook" title="Buku">📖</div>
        <div class="iconbtn on" id="btnMusic" title="Musik">🎵</div>
        <div class="iconbtn" id="btnHelp" title="Bantuan">❔</div>
      </div>
    </div>
    <div id="quest"><b id="questLabel">Misi</b><span id="questTxt"></span></div>
    <div id="minimap"><canvas id="mmCv" width="132" height="88"></canvas><div class="mlbl" id="mmLbl">Peta</div></div>
    <div id="compass"><span class="needle"><b>➤</b></span><span class="ctxt" id="compassTxt"></span></div>
    <div id="prompt"><span class="key" id="promptKey">E</span><span id="promptTxt"></span></div>
    <div id="toast"></div>
  </div>

  <div id="touch">
    <div id="joy"><div class="nub"></div></div>
    <div id="actBtn">PERIKSA</div>
  </div>

  <div id="dialog"><div class="panel"><canvas class="face" width="16" height="16"></canvas>
    <div style="flex:1"><div class="who"></div><div class="line"></div><div class="more"></div></div></div></div>

  <!-- start -->
  <div class="scrim show" id="start">
    <div class="panel"><div class="hero">
      <div class="tag" id="sTag">Petualangan Piksel</div>
      <h1>Jelajah Tulungagung</h1>
      <div style="font-size:13px;opacity:.9" id="sRegion">Jawa Timur • Kota Marmer</div>
      <div class="langrow"><button data-lang="id" class="on">Indonesia</button><button data-lang="en">English</button><button data-lang="jv">Basa Jawa</button></div>
    </div><div class="body">
      <p class="lead" id="sLead"></p>
      <div class="howto">
        <div id="sH1"></div><div id="sH2"></div><div id="sH3"></div><div id="sH4"></div>
      </div>
      <div class="start-actions">
        <button class="btn" id="playBtn"></button>
        <button class="btn alt" id="playMute"></button>
      </div>
      <div class="credit" id="sCredit"></div>
    </div></div>
  </div>

  <!-- spot popup -->
  <div class="scrim" id="popup"><div class="panel" style="position:relative">
    <button class="closeX" data-close>×</button>
    <div class="pp-top" id="ppTop"><canvas id="ppArt" width="580" height="188"></canvas>
      <img class="pp-photo" id="ppPhoto" alt="">
      <button class="pp-nav prev" id="ppPrev">‹</button>
      <button class="pp-nav next" id="ppNext">›</button>
      <div class="pp-count" id="ppCount"></div>
      <div class="pp-cap" id="ppCap"></div>
      <div class="pp-spin" id="ppSpin"><div class="sp"></div><span id="ppSpinTxt"></span></div>
      <div class="pp-kind" id="ppKind"></div>
      <div class="pp-stamp" id="ppStamp"></div>
    </div>
    <div class="pp-body">
      <h2 id="ppName"></h2>
      <div class="pp-loc" id="ppLoc"></div>
      <div class="pp-meta" id="ppMeta"></div>
      <div class="pp-travel" id="ppTravel"></div>
      <div class="goodrow" id="ppGood"></div>
      <p class="pp-desc" id="ppDesc"></p>
      <ul class="pp-facts" id="ppFacts"></ul>
      <p class="pp-note" id="ppNote"></p>
      <div class="pp-foot">
        <div class="pp-src" id="ppSrc"></div>
        <button class="btn" data-close id="ppClose"></button>
      </div>
    </div>
  </div></div>

  <!-- guidebook -->
  <div class="scrim" id="book"><div class="panel">
    <div class="bk-head"><h2 id="bkTitle">📖 Buku Petualang</h2><button class="btn alt" data-close id="bkClose"></button></div>
    <div class="bk-tabs" id="bkTabs"></div>
    <div class="bk-grid" id="bkGrid"></div>
  </div></div>

  <!-- help -->
  <div class="scrim" id="help"><div class="panel" style="max-width:480px;padding:20px 22px;position:relative;max-height:90vh;overflow:auto">
    <button class="closeX" data-close>×</button>
    <h2 style="margin:.1em 0 .4em" id="hpTitle"></h2>
    <div class="howto" style="grid-template-columns:1fr" id="hpList"></div>
    <p class="hint" id="hpSave"></p>
  </div></div>

  <!-- lightbox (fullscreen real photo) -->
  <div class="scrim" id="lightbox" style="z-index:30;background:rgba(0,0,0,.92)">

/* ---------------- world constants ---------------- */
const TILE=32, MAPW=98, MAPH=64, SAVE_KEY='jelajah_tulungagung_v2';
const T={GRASS:0,GRASS2:1,SAND:2,SHALLOW:3,SEA:4,DEEP:5,FOREST:6,PATH:7,PLAZA:8,ROCK:9,FLOWER:10,PINE:11};
const SOLID=new Set([T.SEA,T.DEEP,T.FOREST,T.ROCK,T.PINE]);
const map=new Uint8Array(MAPW*MAPH);
function gidx(x,y){return y*MAPW+x;}
function noise(x,y){let n=Math.sin(x*12.9898+y*78.233)*43758.5453;return n-Math.floor(n);}

function genWorld(){
  for(let y=0;y<MAPH;y++)for(let x=0;x<MAPW;x++){
    const coast=50+Math.sin(x*0.18)*2.4+Math.sin(x*0.05)*3.5;
    let tt=T.GRASS;
    if(y>coast+8)tt=T.DEEP; else if(y>coast+4)tt=T.SEA; else if(y>coast+2)tt=T.SHALLOW; else if(y>coast)tt=T.SAND;
    else{const n=noise(x*0.9,y*0.9); tt=n>0.86?T.GRASS2:(n>0.8?T.FLOWER:T.GRASS);}
    map[gidx(x,y)]=tt;
  }
  // lighter forest belt (less maze)
  for(let y=28;y<46;y++)for(let x=2;x<MAPW-2;x++){
    const n=noise(x*0.4+5,y*0.4+9);
    if(n>0.72&&map[gidx(x,y)]===T.GRASS)map[gidx(x,y)]=n>0.9?T.PINE:T.FOREST;
  }
  for(let y=2;y<9;y++)for(let x=2;x<MAPW-2;x++){if(noise(x*0.5,y*0.5+30)>0.62&&map[gidx(x,y)]<2)map[gidx(x,y)]=T.PINE;}
  // town plaza
  for(let y=10;y<27;y++)for(let x=36;x<66;x++){const dx=(x-51)/15,dy=(y-19)/9;if(dx*dx+dy*dy<1)map[gidx(x,y)]=(Math.abs(x-51)<1||Math.abs(y-19)<1)?T.PATH:T.PLAZA;}
  // clearings around spots/npcs (radius 3 = roomy)
  const clear=(cx,cy)=>{for(let dy=-3;dy<=3;dy++)for(let dx=-3;dx<=3;dx++){const x=cx+dx,y=cy+dy;if(x<1||y<1||x>=MAPW-1||y>=MAPH-1)continue;const tt=map[gidx(x,y)];if(tt===T.FOREST||tt===T.PINE||tt===T.ROCK)map[gidx(x,y)]=T.GRASS;if((tt===T.SEA||tt===T.DEEP)&&dy<=0)map[gidx(x,y)]=T.SAND;}};
  SPOTS.forEach(s=>clear(s.x,s.y)); NPCS.forEach(n=>clear(n.x,n.y));
  // guided trail: hub -> through every TOUR spot, laying a clear walkable path
  const landOK=tt=>!(tt===T.SEA||tt===T.DEEP||tt===T.SHALLOW);
  const lay=(x,y)=>{if(x<1||y<1||x>=MAPW-1||y>=MAPH-1)return;const tt=map[gidx(x,y)];if(landOK(tt)&&tt!==T.PLAZA)map[gidx(x,y)]=T.PATH;};
  const line=(x0,y0,x1,y1)=>{let dx=Math.abs(x1-x0),dy=Math.abs(y1-y0),sx=x0<x1?1:-1,sy=y0<y1?1:-1,err=dx-dy,x=x0,y=y0;
    while(true){lay(x,y);lay(x+1,y);lay(x,y+1);if(x===x1&&y===y1)break;const e2=2*err;if(e2>-dy){err-=dy;x+=sx;}if(e2<dx){err+=dx;y+=sy;}}};
  let prev=[51,24];
  TOUR.forEach(id=>{const s=SPOTS.find(o=>o.id===id);line(prev[0],prev[1],s.x,s.y);prev=[s.x,s.y];});
}
genWorld();

let VIEW={w:0,h:0,dpr:1,zoom:2};
function resize(){
  const dpr=Math.min(window.devicePixelRatio||1,2);
  VIEW.dpr=dpr;VIEW.w=window.innerWidth;VIEW.h=window.innerHeight;
  cv.width=Math.floor(VIEW.w*dpr);cv.height=Math.floor(VIEW.h*dpr);
  const base=Math.min(VIEW.w,VIEW.h);
  VIEW.zoom=base<560?2.2:base<900?2.0:1.85;
  ctx2.imageSmoothingEnabled=false;
}

function joyStart(e){joyActive=true;joyMove(e);}
function joyMove(e){if(!joyActive)return;const tt=e.touches?e.touches[0]:e;const r=joy.getBoundingClientRect(),cx=r.left+r.width/2,cy=r.top+r.height/2;let dx=tt.clientX-cx,dy=tt.clientY-cy;const max=r.width/2-10,d=Math.hypot(dx,dy);if(d>max){dx=dx/d*max;dy=dy/d*max;}nub.style.transform=`translate(${dx}px,${dy}px)`;joyVec.x=dx/max;joyVec.y=dy/max;}
function joyEnd(){joyActive=false;joyVec.x=0;joyVec.y=0;nub.style.transform='translate(0,0)';}
joy.addEventListener('touchstart',joyStart,{passive:true});joy.addEventListener('touchmove',joyMove,{passive:true});joy.addEventListener('touchend',joyEnd);joy.addEventListener('touchcancel',joyEnd);
joy.addEventListener('mousedown',joyStart);addEventListener('mousemove',e=>{if(joyActive&&!('ontouchstart'in window))joyMove(e);});addEventListener('mouseup',()=>{if(joyActive&&!('ontouchstart'in window))joyEnd();});

function solidAt(px,py){const tx=Math.floor(px/TILE),ty=Math.floor(py/TILE);if(tx<0||ty<0||tx>=MAPW||ty>=MAPH)return true;return SOLID.has(map[gidx(tx,ty)]);}
function canMove(nx,ny){const r=8;return !solidAt(nx-r,ny+10)&&!solidAt(nx+r,ny+10)&&!solidAt(nx-r,ny+14)&&!solidAt(nx+r,ny+14);}

let visited=new Set();
let wishlist=new Set();
function loadSave(){try{const s=JSON.parse(localStorage.getItem(SAVE_KEY));if(s){if(s.visited)visited=new Set(s.visited);if(s.wishlist)wishlist=new Set(s.wishlist);}}catch(e){}}
function save(){try{localStorage.setItem(SAVE_KEY,JSON.stringify({visited:[...visited],wishlist:[...wishlist]}));}catch(e){}}

let nearTarget=null;
function findNear(){let best=null,bd=46*46;const all=[...SPOTS.map(s=>({o:s,_t:'spot'})),...NPCS.map(n=>({o:n,_t:'npc'}))];for(const it of all){const o=it.o;const ox=o.x*TILE+TILE/2,oy=o.y*TILE+TILE/2;const dx=ox-player.x,dy=oy-(player.y+12),d=dx*dx+dy*dy;if(d<bd){bd=d;best={...it};}}return best;}
function tryInteract(){if(dialogEl.style.display==='block'){advanceDialog();return;}if(document.querySelector('.scrim.show'))return;const n=nearTarget;if(!n)return;if(n._t==='npc')openDialog(n.o);else openSpot(n.o.id);}

/* objective (guided tour) */
function nextObjective(){for(const id of TOUR){if(!visited.has(id))return SPOTS.find(s=>s.id===id);}return null;}

/* ---------------- render ---------------- */
function tileColor(tt,x,y){const n=noise(x*0.7+1,y*0.7+3),i4=(n*4)|0,i3=(n*3)|0;switch(tt){
  case T.GRASS:case T.FLOWER:return ['#5f9f46','#67a64d','#6cab51','#5b9b42'][i4];
  case T.GRASS2:return '#56953e';
  case T.SAND:return ['#e7cd92','#ecd49a','#e3c587','#efd9a2'][i4];
  case T.SHALLOW:return '#5fbfc6';case T.SEA:return '#2f93a8';case T.DEEP:return '#1c6a82';
  case T.PATH:return ['#cdb07e','#d4ba86','#c7a877','#d8bd8a'][i4];
  case T.PLAZA:return ['#d6c9ad','#dccfb3','#d0c2a4'][i3];
  case T.FOREST:return '#5f9f46';case T.PINE:return '#56953e';case T.ROCK:return '#9a9389';default:return '#67a64d';}}
function drawTreeP(sx,sy,s,pine){
  ctx2.fillStyle='rgba(0,0,0,.13)';ctx2.beginPath();ctx2.ellipse(sx+s/2,sy+s*0.93,s*0.32,s*0.11,0,0,7);ctx2.fill();
  ctx2.fillStyle='#7c4a25';ctx2.fillRect(sx+s*0.42,sy+s*0.55,s*0.16,s*0.4);
  if(pine){ctx2.fillStyle='#2c6b3c';for(let i=0;i<3;i++){const w=s*(0.6-i*0.15),yy=sy+s*0.1+i*s*0.22;ctx2.beginPath();ctx2.moveTo(sx+s/2,yy);ctx2.lineTo(sx+s/2-w/2,yy+s*0.28);ctx2.lineTo(sx+s/2+w/2,yy+s*0.28);ctx2.closePath();ctx2.fill();}ctx2.fillStyle='#3f8a50';ctx2.fillRect(sx+s*0.30,sy+s*0.30,s*0.1,s*0.1);}
  else{ctx2.fillStyle='#2f7a3e';ctx2.beginPath();ctx2.arc(sx+s/2,sy+s*0.42,s*0.35,0,7);ctx2.fill();ctx2.fillStyle='#3f9450';ctx2.beginPath();ctx2.arc(sx+s*0.40,sy+s*0.36,s*0.18,0,7);ctx2.fill();ctx2.fillStyle='#54a862';ctx2.beginPath();ctx2.arc(sx+s*0.34,sy+s*0.32,s*0.08,0,7);ctx2.fill();}}

function drawWorld(t){
  const z=VIEW.zoom,dpr=VIEW.dpr;
  ctx2.setTransform(dpr,0,0,dpr,0,0);ctx2.clearRect(0,0,VIEW.w,VIEW.h);
  cam.x+=(player.x-cam.x)*0.12;cam.y+=(player.y-cam.y)*0.12;
  const camPX=cam.x*z-VIEW.w/2,camPY=cam.y*z-VIEW.h/2;
  ctx2.save();ctx2.translate(-camPX,-camPY);ctx2.scale(z,z);
  const x0=Math.max(0,Math.floor(camPX/z/TILE)-1),x1=Math.min(MAPW,Math.ceil((camPX+VIEW.w)/z/TILE)+1);
  const y0=Math.max(0,Math.floor(camPY/z/TILE)-1),y1=Math.min(MAPH,Math.ceil((camPY+VIEW.h)/z/TILE)+1);
  for(let y=y0;y<y1;y++)for(let x=x0;x<x1;x++){const tt=map[gidx(x,y)],sx=x*TILE,sy=y*TILE;
    ctx2.fillStyle=tileColor(tt,x,y);ctx2.fillRect(sx,sy,TILE+1,TILE+1);
    if(tt===T.GRASS||tt===T.GRASS2){const n=noise(x*2.1,y*2.3);if(n>0.7){ctx2.fillStyle='rgba(38,86,38,.20)';ctx2.fillRect(sx+9,sy+18,2,5);ctx2.fillRect(sx+12,sy+16,2,7);ctx2.fillRect(sx+15,sy+19,2,5);}}
    else if(tt===T.SHALLOW||tt===T.SEA||tt===T.DEEP){const sh=Math.sin((x*0.6+y*0.4)+t*0.0018);if(sh>0.55){ctx2.fillStyle='rgba(255,255,255,.16)';ctx2.fillRect(sx+6,sy+TILE*0.4,TILE*0.5,2);}}
    else if(tt===T.FLOWER){const c=['#e7c66b','#e0556b','#f4f4f4','#d98cc4'][(x*7+y*3)%4];ctx2.fillStyle='#3f7d2e';ctx2.fillRect(sx+9,sy+13,1,4);ctx2.fillRect(sx+19,sy+21,1,4);ctx2.fillStyle=c;ctx2.fillRect(sx+8,sy+10,4,4);ctx2.fillRect(sx+18,sy+18,4,4);}
    else if(tt===T.PATH){ctx2.fillStyle='rgba(120,85,45,.16)';ctx2.fillRect(sx+4,sy+6,3,3);ctx2.fillRect(sx+20,sy+18,3,3);ctx2.fillRect(sx+12,sy+24,2,2);}
    if(tt===T.SAND){const below=y+1<MAPH?map[gidx(x,y+1)]:0;if(below===T.SHALLOW||below===T.SEA){const f=Math.sin(x*0.8+t*0.004);ctx2.fillStyle='rgba(255,255,255,'+(0.32+f*0.18).toFixed(2)+')';ctx2.fillRect(sx,sy+TILE-4+f*2,TILE+1,4);}}}
  for(let y=y0;y<y1;y++)for(let x=x0;x<x1;x++){const tt=map[gidx(x,y)];
    if(tt===T.FOREST)drawTreeP(x*TILE,y*TILE-6,TILE,false);
    else if(tt===T.PINE)drawTreeP(x*TILE,y*TILE-6,TILE,true);
    else if(tt===T.ROCK){ctx2.fillStyle='#8b847a';ctx2.beginPath();ctx2.arc(x*TILE+16,y*TILE+18,11,0,7);ctx2.fill();}}
  // dust under markers
  for(const d of dust){ctx2.globalAlpha=d.a;ctx2.fillStyle='#cdb07e';ctx2.beginPath();ctx2.arc(d.x,d.y,d.r,0,7);ctx2.fill();ctx2.globalAlpha=1;}
  // welcome floor text at the town square (“welcome” above “TULUNGAGUNG”)
  ctx2.save();ctx2.textAlign='center';ctx2.textBaseline='middle';
  ctx2.font='800 18px "Trebuchet MS",sans-serif';ctx2.fillStyle='rgba(45,33,20,.34)';
  ctx2.fillText((UI.welcome[lang]||UI.welcome.id),51*TILE+16,22*TILE);
  ctx2.font='800 44px "Trebuchet MS",sans-serif';
  ctx2.lineWidth=4;ctx2.strokeStyle='rgba(255,248,228,.55)';ctx2.strokeText('TULUNGAGUNG',51*TILE+16,23.9*TILE);
  ctx2.fillStyle='rgba(45,33,20,.42)';ctx2.fillText('TULUNGAGUNG',51*TILE+16,23.9*TILE);
  ctx2.restore();
  const obj=nextObjective();
  for(const s of SPOTS)drawMarker(s.x*TILE+TILE/2,s.y*TILE+TILE/2,s,t,obj&&obj.id===s.id);
  for(const n of NPCS)drawNPC(n.x*TILE+TILE/2,n.y*TILE+TILE/2,n,t);
  drawPlayer(t);
  ctx2.restore();

function drawPlayer(t){
  const px=Math.round(player.x),py=Math.round(player.y);

  const frame=player.moving?Math.floor(player.anim*spd/6)%4:0;

  const dir=player.dir;
  // shadow
  ctx2.fillStyle='rgba(0,0,0,.22)';ctx2.beginPath();ctx2.ellipse(px,py+18,10,4,0,0,7);ctx2.fill();
  const yo=py-4+bodyBob;
  const skin='#f2c79b',shirt='#f4efe6',deni='#3a63b0',deni2='#2f5092',cap='#3f9450',pony='#7a4a25',band='#c2532f',pack='#caa24a';
  // legs (animate)
  ctx2.fillStyle=deni2;

    ctx2.fillRect(px-3,py+11,5,8+legSwing*2);

  }else{

  }
  // shoes
  ctx2.fillStyle='#2b2118';
  ctx2.fillRect(px-6,py+18+Math.max(0,legSwing)*1.5,5,3);ctx2.fillRect(px+1,py+18+Math.max(0,-legSwing)*1.5,5,3);
  // backpack (visible from behind / sides)
  if(dir==='up'){ctx2.fillStyle=pack;ctx2.fillRect(px-7,yo+1,14,13);ctx2.fillStyle='#b07a2e';ctx2.fillRect(px-7,yo+6,14,3);}
  else if(dir!=='down'){ctx2.fillStyle=pack;const bx=dir==='left'?px+3:px-9;ctx2.fillRect(bx,yo+2,6,11);}
  // body / overalls
  ctx2.fillStyle=shirt;ctx2.fillRect(px-7,yo,14,9);            // shirt top
  ctx2.fillStyle=deni;ctx2.fillRect(px-7,yo+6,14,10);          // overalls
  ctx2.fillStyle=deni2;ctx2.fillRect(px-7,yo+6,14,2);
  // overall straps
  ctx2.fillStyle=deni;ctx2.fillRect(px-5,yo+1,2,6);ctx2.fillRect(px+3,yo+1,2,6);
  // bandana around neck
  ctx2.fillStyle=band;ctx2.fillRect(px-5,yo-1,10,3);
  if(dir==='down'){ctx2.beginPath();ctx2.moveTo(px-2,yo+1);ctx2.lineTo(px+2,yo+1);ctx2.lineTo(px,yo+5);ctx2.closePath();ctx2.fill();}
  // arms swing
  ctx2.fillStyle=skin;
  if(player.moving&&(dir==='down'||dir==='up')){ctx2.fillRect(px-9,yo+5-legSwing*2,3,7);ctx2.fillRect(px+6,yo+5+legSwing*2,3,7);}
  else{ctx2.fillRect(px-9,yo+5,3,7);ctx2.fillRect(px+6,yo+5,3,7);}
  // head
  ctx2.fillStyle=skin;ctx2.fillRect(px-6,yo-12,12,12);
  // ponytail (back)
  ctx2.fillStyle=pony;
  if(dir==='down'){ctx2.fillRect(px-8,yo-9,2,7);ctx2.fillRect(px+6,yo-9,2,7);}
  else if(dir==='up'){ctx2.fillRect(px-3,yo-2,6,8);}
  else{const tx=dir==='left'?px+5:px-7;ctx2.fillRect(tx,yo-8,3,8);}
  // cap (worn back-to-front: brim at back)
  ctx2.fillStyle=cap;ctx2.fillRect(px-7,yo-15,14,5);ctx2.fillRect(px-6,yo-18,12,4);
  ctx2.fillStyle='#2c6b3c';ctx2.fillRect(px-7,yo-12,14,2);
  // brim direction
  ctx2.fillStyle=cap;
  if(dir==='down')ctx2.fillRect(px-4,yo-10,8,2);
  else if(dir==='left')ctx2.fillRect(px+5,yo-15,4,4);

}

/* ---------------- update loop ---------------- */
let last=0;
function loop(t){
  const dt=Math.min(33,t-last);last=t;
  let vx=0,vy=0;
  if(keys['arrowup']||keys['w'])vy-=1;if(keys['arrowdown']||keys['s'])vy+=1;
  if(keys['arrowleft']||keys['a'])vx-=1;if(keys['arrowright']||keys['d'])vx+=1;
  let joyMag=Math.hypot(joyVec.x,joyVec.y);
  if(joyMag>0.18){vx+=joyVec.x;vy+=joyVec.y;}
  const mag=Math.hypot(vx,vy);
  const uiOpen=!!document.querySelector('.scrim.show')||dialogEl.style.display==='block';
  player.run=(keys['shift']|| joyMag>0.85);
  if(mag>0.1&&!uiOpen){
    vx/=mag;vy/=mag;
    const sp=player.speed*(player.run?1.5:1)*(dt/16)*(joyMag>0.18&&joyMag<0.85?Math.max(0.5,joyMag):1);
    const nx=player.x+vx*sp,ny=player.y+vy*sp;
    if(canMove(nx,player.y))player.x=nx;if(canMove(player.x,ny))player.y=ny;
    player.moving=true;player.anim+=dt*0.3;
    if(Math.abs(vx)>Math.abs(vy))player.dir=vx<0?'left':'right';else player.dir=vy<0?'up':'down';
    if(player.run)spawnDust(t);
    maybeFootstep(t);
  }else{player.moving=false;}
  player.x=Math.max(TILE,Math.min((MAPW-1)*TILE,player.x));
  player.y=Math.max(TILE,Math.min((MAPH-1)*TILE,player.y));
  // dust update
  for(const d of dust){d.r+=dt*0.02;d.a-=dt*0.0018;}dust=dust.filter(d=>d.a>0);
  if(!uiOpen){
    nearTarget=findNear();
    const p=document.getElementById('prompt');
    if(nearTarget){p.style.display='flex';const o=nearTarget.o;document.getElementById('promptTxt').textContent=(nearTarget._t==='npc'?t_talk(o):t_view(o));}
    else p.style.display='none';
  }else document.getElementById('prompt').style.display='none';
  drawWorld(t);
  updateCompass();
  if(t-lastMM>120){drawMinimap();lastMM=t;}
  requestAnimationFrame(loop);
}
function t_view(o){return t('view')+' • '+o.name;}
function t_talk(o){return t('talk')+' • '+npcName(o);}
function npcName(o){return {lurah:'Pak Lurah',mbok:'Mbok Lodho',nelayan:'Pak Nelayan',pemahat:'Mas Pemahat'}[o.id];}
function spawnDust(t){if(t-lastDust<90)return;lastDust=t;dust.push({x:player.x+(Math.random()*8-4),y:player.y+18,r:2,a:.5});}
let lastDust=0,lastMM=0,lastStep=0;
function maybeFootstep(t){const iv=player.run?200:300;if(t-lastStep>iv){lastStep=t;if(Audio_on)sfxStep();}}

/* compass chip */
function updateCompass(){
  const c=document.getElementById('compass');
  const obj=nextObjective();
  if(!obj||document.querySelector('.scrim.show')){c.style.display='none';return;}
  const dxT=obj.x-player.x/TILE,dyT=obj.y-(player.y/TILE);
  const distT=Math.hypot(dxT,dyT);
  c.style.display='flex';
  const ang=Math.atan2(dyT,dxT);
  c.querySelector('.needle b').style.transform=`rotate(${ang}rad)`;
  const meters=Math.round(distT*6);
  const stepN=TOUR.indexOf(obj.id)+1;
  if(distT<1.6){c.querySelector('#compassTxt').innerHTML=`<b>${obj.name}</b><small>${t('arrived')}</small>`;}
  else{c.querySelector('#compassTxt').innerHTML=`<b>${obj.name}</b><small>${KL(obj.kind)} · ${dirWord(dxT,dyT)} · ${meters} m</small>`;}
}

const mm=document.getElementById('mmCv'),mmx=mm.getContext('2d');
function drawMinimap(){
  const W=mm.width,H=mm.height,sx=W/MAPW,sy=H/MAPH;mmx.clearRect(0,0,W,H);
  // coarse background
  for(let y=0;y<MAPH;y+=2)for(let x=0;x<MAPW;x+=2){const tt=map[gidx(x,y)];let c;
    if(tt===T.SEA||tt===T.DEEP||tt===T.SHALLOW)c='#2f93a8';else if(tt===T.SAND)c='#e6ca8d';else if(tt===T.PATH||tt===T.PLAZA)c='#d8bd8a';else if(tt===T.FOREST||tt===T.PINE)c='#4f8a3e';else c='#6fae54';
    mmx.fillStyle=c;mmx.fillRect(x*sx,y*sy,sx*2,sy*2);}
  const obj=nextObjective();
  for(const s of SPOTS){const done=visited.has(s.id);mmx.fillStyle=done?'#8a8580':(PALETTES[s.kind].b);mmx.beginPath();mmx.arc(s.x*sx,s.y*sy,done?1.6:2.2,0,7);mmx.fill();
    if(obj&&obj.id===s.id){mmx.strokeStyle='#e7c66b';mmx.lineWidth=1.5;mmx.beginPath();mmx.arc(s.x*sx,s.y*sy,4,0,7);mmx.stroke();}}
  // player
  const px=(player.x/TILE)*sx,py=(player.y/TILE)*sy;
  mmx.fillStyle='#fff';mmx.strokeStyle='#2b2118';mmx.lineWidth=1.5;mmx.beginPath();mmx.arc(px,py,2.6,0,7);mmx.fill();mmx.stroke();
}

/* ---- real photos via Wikimedia Commons (live, royalty-safe, attributed) ---- */
const photoState={list:[],idx:0};let lbIdx=0;
function stripHtml(h){if(!h)return '';const dv=document.createElement('div');dv.innerHTML=h;return (dv.textContent||'').replace(/\s+/g,' ').trim().slice(0,90);}
async function commonsSearch(q){
  const url=`https://commons.wikimedia.org/w/api.php?action=query&format=json&origin=*&generator=search&gsrnamespace=6&gsrsearch=${encodeURIComponent(q)}&gsrlimit=12&prop=imageinfo&iiprop=url|extmetadata&iiurlwidth=1280`;
  const r=await fetch(url);const j=await r.json();
  const pages=j.query&&j.query.pages?Object.values(j.query.pages):[];
  pages.sort((a,b)=>(a.index||0)-(b.index||0));
  return pages.filter(p=>p.imageinfo&&/\.(jpe?g|png)$/i.test(p.title)).map(p=>{const ii=p.imageinfo[0],em=ii.extmetadata||{};return {thumb:ii.thumburl,page:ii.descriptionurl,artist:stripHtml(em.Artist&&em.Artist.value)||'Wikimedia',license:(em.LicenseShortName&&em.LicenseShortName.value)||'CC'};});
}
async function loadPhotos(spot){if(spot._photos)return spot._photos;let res=[];for(const q of (spot.wiki||[spot.name])){try{res=await commonsSearch(q);}catch(e){res=[];}if(res.length)break;}spot._photos=res;return res;}
async function loadAndShowPhotos(s){
  const img=$('#ppPhoto'),spin=$('#ppSpin'),cap=$('#ppCap'),count=$('#ppCount'),top=$('#ppTop');
  img.classList.remove('on');top.classList.remove('multi');cap.classList.remove('on');count.classList.remove('on');img.removeAttribute('src');

function showPhoto(i){const list=photoState.list;if(!list.length)return;photoState.idx=(i+list.length)%list.length;const p=list[photoState.idx];const img=$('#ppPhoto'),cap=$('#ppCap'),count=$('#ppCount'),top=$('#ppTop');img.src=p.thumb;img.classList.add('on');cap.classList.add('on');cap.innerHTML=`📷 ${p.artist} · ${p.license} · <a href="${p.page}" target="_blank" rel="noopener">Wikimedia ↗</a>`;count.classList.add('on');count.textContent=`${photoState.idx+1}/${list.length}`;top.classList.toggle('multi',list.length>1);}

function drawFace(c,col){const x=c.getContext('2d');x.imageSmoothingEnabled=false;x.clearRect(0,0,16,16);x.fillStyle=col;x.fillRect(0,8,16,8);x.fillStyle='#f0c79b';x.fillRect(2,2,12,11);x.fillStyle='#3a2a18';x.fillRect(1,1,14,4);x.fillStyle='#2b2118';x.fillRect(5,7,2,2);x.fillRect(9,7,2,2);}

/* ---- postcard art (unchanged engine) ---- */
function drawPostcard(canvas,s,W,H){
  const x=canvas.getContext('2d');x.imageSmoothingEnabled=false;const pal=PALETTES[s.kind];canvas.width=W;canvas.height=H;
  let g=x.createLinearGradient(0,0,0,H);g.addColorStop(0,pal.sky);g.addColorStop(1,'#fff');x.fillStyle=g;x.fillRect(0,0,W,H);
  const sun=()=>{x.fillStyle='rgba(255,236,170,.9)';x.beginPath();x.arc(W*0.8,H*0.28,26,0,7);x.fill();};
  if(s.kind==='beach'){sun();x.fillStyle=pal.b;x.fillRect(0,H*0.45,W,H*0.3);x.fillStyle=pal.c;x.fillRect(0,H*0.62,W,H*0.13);
    x.fillStyle='rgba(255,255,255,.5)';for(let i=0;i<6;i++)x.fillRect(20+i*95,H*0.55,40,3);
    x.fillStyle=pal.a;x.beginPath();x.moveTo(0,H);x.lineTo(0,H*0.72);x.quadraticCurveTo(W*0.5,H*0.66,W,H*0.74);x.lineTo(W,H);x.fill();
    x.fillStyle='#7c4a25';x.fillRect(W*0.16,H*0.5,8,H*0.4);x.fillStyle='#2f7a3e';for(let i=0;i<5;i++){x.save();x.translate(W*0.16+4,H*0.5);x.rotate((i-2)*0.5);x.fillRect(0,-4,46,8);x.restore();}
    x.fillStyle='#c2532f';x.fillRect(W*0.6,H*0.6,46,10);x.fillStyle='#fff';x.fillRect(W*0.6+20,H*0.5,4,H*0.1);
  }else if(s.kind==='water'){x.fillStyle='#2c6b3c';x.fillRect(0,0,W,H);x.fillStyle='#3f8a50';for(let i=0;i<40;i++){x.beginPath();x.arc(noise(i,2)*W,noise(i,5)*H*0.7,18,0,7);x.fill();}
    x.fillStyle='#8b847a';x.fillRect(W*0.36,H*0.2,W*0.28,H*0.8);x.fillStyle='rgba(235,247,255,.95)';x.fillRect(W*0.45,H*0.2,W*0.1,H*0.62);
    x.fillStyle='rgba(255,255,255,.7)';for(let i=0;i<10;i++)x.fillRect(W*0.45+(i%2?4:14),H*0.22+i*16,4,10);x.fillStyle=pal.b;x.beginPath();x.ellipse(W*0.5,H*0.9,W*0.3,18,0,0,7);x.fill();
  }else if(s.kind==='nature'){sun();x.fillStyle='#cfe6b8';x.fillRect(0,H*0.6,W,H*0.4);
    for(let i=0;i<9;i++){const px=20+i*64,ph=70+(i%3)*22,py=H*0.62;x.fillStyle='#7c4a25';x.fillRect(px-3,py-10,6,18);x.fillStyle=i%2?'#2c6b3c':'#357a44';for(let k=0;k<3;k++){const w=40-k*10,yy=py-ph+k*ph*0.32;x.beginPath();x.moveTo(px,yy);x.lineTo(px-w/2,yy+ph*0.4);x.lineTo(px+w/2,yy+ph*0.4);x.fill();}}
  }else if(s.kind==='culture'){x.fillStyle='#efe7d6';x.fillRect(0,0,W,H);x.fillStyle='#d9d2c6';x.fillRect(0,H*0.7,W,H*0.3);
    const cols=['#e8e3dc','#cfc8bf','#bdb6ac'];for(let i=0;i<5;i++){x.fillStyle=cols[i%3];x.fillRect(40+i*100,H*0.45-(i%2)*20,80,90+(i%2)*20);x.strokeStyle='rgba(120,110,100,.4)';x.lineWidth=2;x.beginPath();x.moveTo(40+i*100,H*0.5);x.lineTo(120+i*100,H*0.6);x.stroke();}
    x.fillStyle='#fff';x.fillRect(W*0.78,H*0.3,40,H*0.5);x.fillStyle='#e3ddd2';x.fillRect(W*0.78,H*0.3,40,10);
  }else{let gg=x.createLinearGradient(0,0,0,H);gg.addColorStop(0,'#f6e2c0');gg.addColorStop(1,'#e9cfa3');x.fillStyle=gg;x.fillRect(0,0,W,H);
    x.fillStyle='#b07a45';x.fillRect(0,H*0.7,W,H*0.3);x.fillStyle='#fff';x.beginPath();x.ellipse(W*0.5,H*0.66,140,46,0,0,7);x.fill();x.fillStyle='#efe7da';x.beginPath();x.ellipse(W*0.5,H*0.66,110,34,0,0,7);x.fill();
    x.fillStyle=pal.a;x.beginPath();x.ellipse(W*0.5,H*0.6,80,40,0,Math.PI,2*Math.PI);x.fill();x.fillStyle=pal.b;x.beginPath();x.ellipse(W*0.42,H*0.58,26,16,0,Math.PI,2*Math.PI);x.fill();
    x.fillStyle='#3f8a50';x.beginPath();x.ellipse(W*0.5,H*0.7,120,20,0,0,Math.PI);x.fill();
    x.strokeStyle='rgba(255,255,255,.6)';x.lineWidth=3;for(let i=0;i<3;i++){x.beginPath();let bx=W*0.4+i*60;for(let k=0;k<3;k++){x.quadraticCurveTo(bx+12,H*0.4-k*18,bx,H*0.33-k*18);}x.stroke();}}
  x.strokeStyle='rgba(43,33,24,.25)';x.lineWidth=6;x.strokeRect(3,3,W-6,H-6);
}

/* ---------------- HUD / badges ---------------- */
function updateHUD(){
  const n=visited.size,total=SPOTS.length;
  $('#progNum').textContent=n;$('#progTxt').textContent=`${n}/${total} ${t('prog')}`;
  $('#progRing').style.setProperty('--p',(n/total*360)+'deg');
  $('#questLabel').textContent=t('questLabel');
  const obj=nextObjective();
  if(!obj){$('#questTxt').textContent=t('done');}
  else{const step=TOUR.indexOf(obj.id)+1;$('#questTxt').innerHTML=`${t('step')} ${step}/${total} — ${KL(obj.kind)}<br>${obj.name}`;}
}
let lastBadges=new Set();
function checkBadges(){
  const cats={beach:{id:'Penjelajah Pesisir',en:'Coast Explorer',jv:'Penjelajah Pesisir'},water:{id:'Pemburu Air Terjun',en:'Waterfall Hunter',jv:'Pemburu Grojogan'},nature:{id:'Sahabat Alam',en:'Nature Friend',jv:'Kanca Alam'},culture:{id:'Pencinta Budaya',en:'Culture Lover',jv:'Pecinta Budaya'},food:{id:'Pemburu Kuliner',en:'Food Hunter',jv:'Pemburu Pangan'}};
  for(const c in cats){const arr=SPOTS.filter(s=>s.kind===c);if(arr.length&&arr.every(s=>visited.has(s.id))&&!lastBadges.has(c)){lastBadges.add(c);setTimeout(()=>{toast('🏅 '+cats[c][lang]);if(Audio_on)sfxBadge();},900);}}
  if(visited.size===SPOTS.length){setTimeout(()=>{toast(t('complete'),t('completeSub'));if(Audio_on)sfxBadge();},1400);}
}
let toastT=null;
function toast(msg,sub){const el=$('#toast');el.innerHTML=msg+(sub?`<small>${sub}</small>`:'');el.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>el.classList.remove('show'),2600);}

/* ---------------- guidebook ---------------- */
let bkTab='all';
function toggleBook(){const b=document.getElementById('book');if(b.classList.contains('show'))b.classList.remove('show');else{renderBook();b.classList.add('show');}}
function renderBook(){
  $('#bkTitle').textContent=t('book');$('#bkClose').textContent=t('close');
  const tabs=[['all',t('all')],['wish',t('wishtab')],['beach',KIND_LABEL.beach[lang]],['water',KIND_LABEL.water[lang]],['nature',KIND_LABEL.nature[lang]],['culture',KIND_LABEL.culture[lang]],['food',KIND_LABEL.food[lang]]];
  $('#bkTabs').innerHTML=tabs.map(([k,l])=>{const arr=k==='all'?SPOTS:(k==='wish'?SPOTS.filter(s=>wishlist.has(s.id)):SPOTS.filter(s=>s.kind===k));const got=arr.filter(s=>visited.has(s.id)).length;return `<div class="bk-tab ${k===bkTab?'on':''}" data-tab="${k}">${l} <span style="opacity:.6">${k==='wish'?arr.length:got+'/'+arr.length}</span></div>`;}).join('');
  $('#bkTabs').querySelectorAll('.bk-tab').forEach(tb=>tb.onclick=()=>{bkTab=tb.dataset.tab;renderBook();});
  const list=bkTab==='all'?SPOTS:(bkTab==='wish'?SPOTS.filter(s=>wishlist.has(s.id)):SPOTS.filter(s=>s.kind===bkTab));
  const grid=$('#bkGrid');grid.innerHTML='';
  if(bkTab==='wish'&&!list.length){grid.innerHTML=`<div style="grid-column:1/-1;text-align:center;opacity:.6;font-size:13px;padding:26px 8px">${t('wishempty')}</div>`;return;}
  list.forEach(s=>{const done=visited.has(s.id);const wished=wishlist.has(s.id);const card=document.createElement('div');card.className='bk-card'+(done?'':' locked');
    card.innerHTML=`<div class="thumb"><canvas width="150" height="78"></canvas>${done?`<div class="cardwish ${wished?'on':''}">${wished?'★':'☆'}</div>`:'<div class="lk">🔒</div>'}</div><div class="nm">${done?s.name:'???'}<small>${KL(s.kind)}${done?'':' • '+t('locked')}</small></div>`;
    grid.appendChild(card);
    if(done){drawPostcard(card.querySelector('canvas'),s,150,78);card.onclick=()=>{hide('book');openSpot(s.id);};
      const cw=card.querySelector('.cardwish');if(cw)cw.onclick=(e)=>{e.stopPropagation();toggleWish(s.id);};}});
}

/* ---------------- language apply ---------------- */
function applyLang(){
  document.documentElement.lang=lang;localStorage.setItem('jt_lang',lang);
  $('#btnLang').textContent=lang.toUpperCase();
  $('#sTag').textContent=t('appsub');$('#sRegion').textContent=t('region');
  $('#sLead').innerHTML=t('lead');$('#sH1').innerHTML=t('h1');$('#sH2').innerHTML=t('h2');$('#sH3').innerHTML=t('h3');$('#sH4').innerHTML=t('h4');
  $('#playBtn').textContent=t('play');$('#playMute').textContent=t('playmute');$('#sCredit').innerHTML=t('credit');
  $('#mmLbl').textContent=t('map');
  // help
  $('#hpTitle').textContent=t('help');$('#hpSave').textContent=t('hpSave');
  $('#hpList').innerHTML=[t('h1'),t('h2'),t('h3'),t('h4')].map(h=>`<div>${h}</div>`).join('');
  document.querySelectorAll('#start .langrow button').forEach(b=>b.classList.toggle('on',b.dataset.lang===lang));
  updateHUD();
  if(document.getElementById('popup').classList.contains('show'))renderPopup();
  if(document.getElementById('book').classList.contains('show'))renderBook();
  if(dialogEl.style.display==='block')renderDialog();
  if(document.getElementById('about').classList.contains('show'))renderAbout();
}
function setLang(l){lang=l;applyLang();}
$('#btnLang').onclick=()=>{const order=['id','en','jv'];setLang(order[(order.indexOf(lang)+1)%3]);};
document.querySelectorAll('#start .langrow button').forEach(b=>b.onclick=()=>setLang(b.dataset.lang));

/* buttons */
$('#btnBook').onclick=toggleBook;
$('#btnHelp').onclick=()=>show('help');
$('#btnAbout').onclick=()=>{renderAbout();show('about');};
$('#btnMusic').onclick=()=>toggleAudio();
$('#btnMap').onclick=()=>{const m=document.getElementById('minimap');const on=m.style.display!=='none';m.style.display=on?'none':'block';$('#btnMap').classList.toggle('on',!on);};

/* ===================================================== AUDIO: GAMELAN === */
let AC=null,master=null,reverb=null,Audio_on=true,gamelanTimer=null;
const Slendro=[0,231,474,711,953];
function centsToRatio(c){return Math.pow(2,c/1200);}
function noteFreq(deg,oct){const base=220*Math.pow(2,oct);return base*centsToRatio(Slendro[((deg%5)+5)%5])*(deg>=5?2:deg<0?0.5:1);}
function makeReverb(){const len=AC.sampleRate*2.4,buf=AC.createBuffer(2,len,AC.sampleRate);for(let ch=0;ch<2;ch++){const d=buf.getChannelData(ch);for(let i=0;i<len;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/len,2.6);}const c=AC.createConvolver();c.buffer=buf;return c;}
function metal(time,freq,dur,peak,partials){const out=AC.createGain();out.gain.value=0;out.connect(master);if(reverb)out.connect(reverb);const ratios=partials||[1,2.01,2.78,4.16,5.43];const gains=[1,.5,.32,.18,.1];
  [0,1].forEach(bank=>{ratios.forEach((r,i)=>{const o=AC.createOscillator();o.type=i===0?'triangle':'sine';o.frequency.value=freq*r*(bank?1.006:1);const g=AC.createGain();g.gain.value=0;o.connect(g);g.connect(out);const t0=time,atk=0.004,dcy=dur*(1-i*0.12);g.gain.setValueAtTime(0,t0);g.gain.linearRampToValueAtTime(gains[i]*0.5,t0+atk);g.gain.exponentialRampToValueAtTime(0.0008,t0+Math.max(0.08,dcy));o.start(t0);o.stop(t0+dur+0.1);});});out.gain.setValueAtTime(peak,time);return out;}
function gong(time,freq,peak){const out=AC.createGain();out.gain.value=peak;out.connect(master);if(reverb)out.connect(reverb);const ratios=[1,1.48,2.0,2.67,3.4],gains=[1,.4,.28,.16,.09];ratios.forEach((r,i)=>{const o=AC.createOscillator();o.type='sine';o.frequency.value=freq*r;const g=AC.createGain();g.gain.value=0;o.connect(g);g.connect(out);g.gain.setValueAtTime(0,time);g.gain.linearRampToValueAtTime(gains[i]*0.6,time+0.01);g.gain.exponentialRampToValueAtTime(0.001,time+3.6*(1-i*0.12));const lfo=AC.createOscillator(),lg=AC.createGain();lfo.frequency.value=0.8+i*0.3;lg.gain.value=gains[i]*0.12;lfo.connect(lg);lg.connect(g.gain);lfo.start(time);lfo.stop(time+3.8);o.start(time);o.stop(time+3.8);});}
function kendang(time,peak){const o=AC.createOscillator(),g=AC.createGain();o.type='sine';o.frequency.setValueAtTime(180,time);o.frequency.exponentialRampToValueAtTime(70,time+0.12);g.gain.setValueAtTime(peak,time);g.gain.exponentialRampToValueAtTime(0.001,time+0.18);o.connect(g);g.connect(master);o.start(time);o.stop(time+0.2);const n=AC.createBufferSource(),nb=AC.createBuffer(1,1024,AC.sampleRate);const d=nb.getChannelData(0);for(let i=0;i<1024;i++)d[i]=Math.random()*2-1;n.buffer=nb;const bp=AC.createBiquadFilter();bp.type='bandpass';bp.frequency.value=420;const ng=AC.createGain();ng.gain.setValueAtTime(peak*0.5,time);ng.gain.exponentialRampToValueAtTime(0.001,time+0.09);n.connect(bp);bp.connect(ng);ng.connect(master);n.start(time);n.stop(time+0.1);}
let beat=0,nextTime=0;
const GONGAN=[[2,3,2,1,2,3,5,3,2,3,2,1,6,5,3,2],[5,6,5,3,2,3,2,1,3,5,6,5,3,2,1,2],[1,2,3,5,6,5,3,2,3,2,3,5,6,1,6,5]];
let gi=0;const BEAT=0.46;
function scheduleBeat(t,b){const deg=GONGAN[gi][b];metal(t,noteFreq(deg,0),BEAT*1.6,0.16);metal(t,noteFreq(deg,1),BEAT*0.8,0.09,[1,2.7,5.0]);if(b%2===0)metal(t+BEAT*0.5,noteFreq(GONGAN[gi][(b+1)%16],1),BEAT*0.6,0.07,[1,2.7,5.0]);if(b%4===2)metal(t,noteFreq(deg,-1)*1.5,BEAT*2,0.12,[1,2.0,3.01]);if(b===6||b===10||b===14)gong(t,noteFreq(GONGAN[gi][b],-1),0.10);if(b===0)gong(t,55,0.16);if(b%2===0)kendang(t,0.05);if(b%4===3)kendang(t+BEAT*0.5,0.04);}
function scheduler(){if(!AC)return;while(nextTime<AC.currentTime+0.25){scheduleBeat(nextTime,beat);beat++;nextTime+=BEAT;if(beat>=16){beat=0;gi=(gi+1)%GONGAN.length;}}}
function startAudio(){if(!AC){AC=new (window.AudioContext||window.webkitAudioContext)();master=AC.createGain();master.gain.value=0.0;master.connect(AC.destination);reverb=makeReverb();const rg=AC.createGain();rg.gain.value=0.5;reverb.connect(rg);rg.connect(AC.destination);beat=0;nextTime=AC.currentTime+0.1;}if(AC.state==='suspended')AC.resume();master.gain.cancelScheduledValues(AC.currentTime);master.gain.linearRampToValueAtTime(0.5,AC.currentTime+1.2);if(!gamelanTimer)gamelanTimer=setInterval(scheduler,60);Audio_on=true;$('#btnMusic').classList.add('on');$('#btnMusic').textContent='🎵';}
function stopAudio(){Audio_on=false;$('#btnMusic').classList.remove('on');$('#btnMusic').textContent='🔇';if(AC&&master)master.gain.linearRampToValueAtTime(0.0,AC.currentTime+0.4);}
function toggleAudio(){if(Audio_on)stopAudio();else startAudio();}
function sfxStep(){if(!AC)return;const n=AC.createBufferSource(),nb=AC.createBuffer(1,512,AC.sampleRate);const d=nb.getChannelData(0);for(let i=0;i<512;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/512,3);n.buffer=nb;const g=AC.createGain();g.gain.value=0.022;n.connect(g);g.connect(AC.destination);n.start();}
function metalSfx(freqs){if(!AC)return;freqs.forEach((f,i)=>setTimeout(()=>{if(AC)metal(AC.currentTime,f,0.5,0.10,[1,2.01,3.0]);},i*90));}
function sfxOpen(){metalSfx([523,659]);}function sfxCollect(){metalSfx([659,880,1047]);}function sfxBadge(){metalSfx([523,659,880,1047,1319]);}

/* ---------------- boot ---------------- */
document.getElementById('playBtn').onclick=()=>{hide('start');startAudio();updateHUD();};
document.getElementById('playMute').onclick=()=>{hide('start');Audio_on=false;$('#btnMusic').classList.remove('on');$('#btnMusic').textContent='🔇';updateHUD();};
applyLang();updateHUD();
requestAnimationFrame(loop);
</script>
